name: Linux Clang

# Tier-1 native gate AND the deep config punch: Linux clang across
# debug / relwithdebinfo / release, so define interactions (CC_ASSERT on with
# debug+relwithdebinfo, off with release; optimization differences) are all
# exercised in one workflow. Linux clang is chosen for the deep matrix because
# it's the fastest, lowest-setup runner. Every other platform runs a single
# relwithdebinfo config (wide but shallow). All work goes through dev.py with
# explicit presets. See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        preset: [debug-linux-clang, relwithdebinfo-linux-clang, release-linux-clang]
    steps:
      - uses: actions/checkout@v5

      # ubuntu-26.04 ships clang 20/21/22 side by side; the *-linux-clang presets
      # invoke bare clang/clang++, so pin those names to the 21.x binaries.
      - name: Select Clang 21
        run: |
          sudo ln -sf /usr/bin/clang-21 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-21 /usr/local/bin/clang++

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for build+test and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor
        continue-on-error: true

      - name: Build
        run: uv run dev.py --collect-logs build/ci-logs.zip build --preset ${{ matrix.preset }} --diag-archive build/ci-diag.zip

      - name: Test
        run: uv run dev.py --collect-logs build/ci-logs.zip test --preset ${{ matrix.preset }} --merged-xml-report build/ci-test-results.xml

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-clang-${{ matrix.preset }}-diagnostics
          path: |
            build/ci-test-results.xml
            build/ci-diag.zip
            build/ci-logs.zip
          if-no-files-found: warn
