name: Linux Clang

# Tier-1 native gate: Linux clang, RelWithDebInfo, build + tests.
# Everything runs through dev.py with an explicit preset (no default-preset
# reliance). Uses the ubuntu-26.04 runner's preinstalled clang/cmake/ninja, so
# there are no toolchain-install steps. See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      # ubuntu-26.04 ships clang 20/21/22 side by side; the
      # relwithdebinfo-linux-clang preset invokes bare clang/clang++, so pin
      # those names to the 21.x binaries (our LLVM 21 family target).
      - name: Select Clang 21
        run: |
          sudo ln -sf /usr/bin/clang-21 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-21 /usr/local/bin/clang++

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for build+test and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor
        continue-on-error: true

      - name: Build
        run: uv run dev.py build --preset relwithdebinfo-linux-clang

      - name: Test
        run: uv run dev.py test --preset relwithdebinfo-linux-clang --merged-xml-report build/ci-test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-clang-test-results
          path: build/ci-test-results.xml
          if-no-files-found: warn
