name: Windows MSVC (VS2026)

# Tier-1 wide-but-shallow gate: Windows MSVC (cl), RelWithDebInfo, build + tests,
# on the windows-2025-vs2026 image (Visual Studio 2026). --toolset 14.51 pins the
# MSVC toolset that VS 2026 ships, so dev.py selects it via vswhere + vcvars and
# fails loudly if it is absent. This is the sibling of ci-windows-msvc.yml, which
# covers the VS 2022 toolset (14.44). See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for build+test and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor --preset relwithdebinfo-msvc --toolset 14.51
        continue-on-error: true

      - name: Build
        run: uv run dev.py --collect-logs build/ci-logs.zip build --preset relwithdebinfo-msvc --toolset 14.51 --diag-archive build/ci-diag.zip --keep-going

      - name: Test
        run: uv run dev.py --collect-logs build/ci-logs.zip test --preset relwithdebinfo-msvc --toolset 14.51 --merged-xml-report build/ci-test-results.xml

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc-vs2026-diagnostics
          path: |
            build/ci-test-results.xml
            build/ci-diag.zip
            build/ci-logs.zip
          if-no-files-found: warn
