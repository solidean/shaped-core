name: macOS Clang

# Tier-2 wide-but-shallow gate: macOS arm64, Homebrew LLVM, RelWithDebInfo.
# Single config; the deep debug/release matrix lives in ci-linux-clang.yml.
# The macos-arm-llvm-* presets point at /opt/homebrew/opt/llvm and link against
# Homebrew libc++, so LLVM (and Ninja) come from brew; CMake ships on the runner.
# Everything runs through dev.py with an explicit preset. See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install LLVM + Ninja
        run: brew install llvm ninja

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for build+test and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor
        continue-on-error: true

      - name: Build
        run: uv run dev.py --collect-logs build/ci-logs.zip build --preset macos-arm-llvm-relwithdebinfo --diag-archive build/ci-diag.zip --keep-going

      - name: Test
        run: uv run dev.py --collect-logs build/ci-logs.zip test --preset macos-arm-llvm-relwithdebinfo --merged-xml-report build/ci-test-results.xml

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-clang-diagnostics
          path: |
            build/ci-test-results.xml
            build/ci-diag.zip
            build/ci-logs.zip
          if-no-files-found: warn
