name: Windows ARM MSVC (VS2022)

# Tier-1 wide-but-shallow gate: Windows arm64 MSVC (cl), RelWithDebInfo, build +
# tests, on the windows-11-arm image (native arm64, Visual Studio 2022). The
# arm64-windows-msvc preset sets the CMake architecture/host toolset to arm64;
# dev.py threads the preset arch into the vcvars -arch so cl targets arm64 rather
# than x64. --toolset 14.44 pins the MSVC toolset (a hard error if absent rather
# than silently using a different default). The checked-in diag-launcher.exe is
# x64 and runs under Windows-11-ARM x64 emulation. See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for build+test and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor --preset relwithdebinfo-arm64-windows-msvc --toolset 14.44
        continue-on-error: true

      - name: Build
        run: uv run dev.py --collect-logs build/ci-logs.zip build --preset relwithdebinfo-arm64-windows-msvc --toolset 14.44 --diag-archive build/ci-diag.zip --keep-going

      - name: Test
        run: uv run dev.py --collect-logs build/ci-logs.zip test --preset relwithdebinfo-arm64-windows-msvc --toolset 14.44 --merged-xml-report build/ci-test-results.xml

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm-msvc-diagnostics
          path: |
            build/ci-test-results.xml
            build/ci-diag.zip
            build/ci-logs.zip
          if-no-files-found: warn
