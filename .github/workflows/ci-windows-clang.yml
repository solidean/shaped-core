name: Windows Clang

# Tier-1 native gate: Windows clang-cl, RelWithDebInfo, build + tests.
# Wide-but-shallow gate (single config); the deep debug/release matrix lives in
# ci-linux-clang.yml. Everything runs through dev.py with an explicit preset (no
# default-preset reliance). Uses the runner's preinstalled toolchain — clang 20
# (LLVM), CMake, Ninja; dev.py injects the MSVC environment for clang-cl via
# vswhere, so there is no toolchain-install or MSVC-setup step. clang-cl ships as
# a single unversioned binary (no clang++-N to swap to), so --toolset 20 here
# *asserts* clang-cl is version 20 rather than selecting it — a hard error if the
# base image moves off clang 20, so the bump is loud. See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for build+test and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor --preset relwithdebinfo-clang --toolset 20
        continue-on-error: true

      - name: Build
        run: uv run dev.py --collect-logs build/ci-logs.zip build --preset relwithdebinfo-clang --toolset 20 --diag-archive build/ci-diag.zip --keep-going

      - name: Test
        run: uv run dev.py --collect-logs build/ci-logs.zip test --preset relwithdebinfo-clang --toolset 20 --merged-xml-report build/ci-test-results.xml

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-clang-diagnostics
          path: |
            build/ci-test-results.xml
            build/ci-diag.zip
            build/ci-logs.zip
          if-no-files-found: warn
