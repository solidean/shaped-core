name: Windows Clang

# Tier-1 native gate: Windows clang-cl, RelWithDebInfo, build + tests.
# Everything runs through dev.py with an explicit preset (no default-preset
# reliance). Uses the windows-latest runner's preinstalled toolchain (LLVM,
# CMake, Ninja); dev.py injects the MSVC environment for clang-cl via vswhere,
# so there is no toolchain-install or MSVC-setup step. See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for build+test and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor
        continue-on-error: true

      - name: Build
        run: uv run dev.py build --preset relwithdebinfo-clang

      - name: Test
        run: uv run dev.py test --preset relwithdebinfo-clang --merged-xml-report build/ci-test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-clang-test-results
          path: build/ci-test-results.xml
          if-no-files-found: warn
