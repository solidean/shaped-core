name: Android NDK (build-only)

# Tier-2 build-only gate: cross-compile to Android arm64-v8a via the NDK, on the
# ubuntu-26.04 image. Build-only — the runner can't execute arm64 Android
# binaries, so there is no test step (that's the build-only CI status; see
# docs/platforms.md). The android-ndk-arm64 preset reads the NDK from
# $ANDROID_NDK_ROOT, which we point at the image's NDK r29 (Clang 21) — the image
# also ships older r27/r28 whose Clang 18/19 lacks the C++23 we use (e.g.
# std::atomic_ref), so the version is pinned loudly rather than taking the default.
# See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # NDK r29 ships Clang 21 (our LLVM floor); the runner default is r27 (Clang 18).
  ANDROID_NDK_VERSION: 29.0.14206865

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Point the preset's $ANDROID_NDK_ROOT at the Clang-21 NDK; a hard error here
      # if the image ever drops r29 is exactly what we want (loud, not silent).
      - name: Select NDK r29 (Clang 21)
        run: |
          ndk="$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION"
          test -d "$ndk" || { echo "::error::NDK $ANDROID_NDK_VERSION not found at $ndk"; exit 1; }
          echo "ANDROID_NDK_ROOT=$ndk" >> "$GITHUB_ENV"

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for a build gate and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor --preset android-ndk-arm64-relwithdebinfo
        continue-on-error: true

      - name: Build
        run: uv run dev.py --collect-logs build/ci-logs.zip build --preset android-ndk-arm64-relwithdebinfo --diag-archive build/ci-diag.zip --keep-going

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ndk-diagnostics
          path: |
            build/ci-diag.zip
            build/ci-logs.zip
          if-no-files-found: warn
