name: Android NDK (build-only)

# Tier-2 build-only gate: cross-compile to Android arm64-v8a via the NDK, on the
# ubuntu-26.04 image. Build-only — the runner can't execute arm64 Android
# binaries, so there is no test step (that's the build-only CI status; see
# docs/platforms.md). The android-ndk-arm64-linux preset reads the NDK from
# $ANDROID_NDK_ROOT (set by the GitHub Ubuntu image) rather than a hardcoded path,
# so it tracks whatever NDK the runner ships. The android presets wire no diag
# launcher, so ci-diag.zip is near-empty; the --collect-logs bundle carries the
# captured compiler output. See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for a build gate and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor --preset android-ndk-arm64-relwithdebinfo
        continue-on-error: true

      - name: Build
        run: uv run dev.py --collect-logs build/ci-logs.zip build --preset android-ndk-arm64-relwithdebinfo --diag-archive build/ci-diag.zip --keep-going

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ndk-diagnostics
          path: |
            build/ci-diag.zip
            build/ci-logs.zip
          if-no-files-found: warn
