name: Windows MSVC

# Tier-1 wide-but-shallow gate: Windows MSVC (cl), RelWithDebInfo, build + tests.
# Uses windows-latest's preinstalled VS + CMake + Ninja; dev.py locates the MSVC
# environment via vswhere, so there is no toolchain-install or MSVC-setup step.
#
# DISABLED on push/PR for now: cc::format's consteval/immediate-function
# validation isn't accepted by MSVC (cl) yet — even MSVC 19.51 (VS 18) emits
# C3615/C7595, plus a C2027 incomplete-type in nexus. Left as workflow_dispatch
# so the fix can be iterated by hand; a follow-up will fix cc::format for MSVC
# (2022+) and restore the push/pull_request triggers. See docs/guides/ci.md.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for build+test and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor
        continue-on-error: true

      - name: Build
        run: uv run dev.py --collect-logs build/ci-logs.zip build --preset relwithdebinfo-msvc --diag-archive build/ci-diag.zip

      - name: Test
        run: uv run dev.py --collect-logs build/ci-logs.zip test --preset relwithdebinfo-msvc --merged-xml-report build/ci-test-results.xml

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc-diagnostics
          path: |
            build/ci-test-results.xml
            build/ci-diag.zip
            build/ci-logs.zip
          if-no-files-found: warn
