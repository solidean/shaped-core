name: Windows MSVC

# Tier-1 wide-but-shallow gate: Windows MSVC (cl), RelWithDebInfo, build + tests.
# Single config; the deep debug/release matrix lives in ci-linux-clang.yml.
# Uses windows-latest's preinstalled VS 2022 + CMake + Ninja; dev.py locates the
# MSVC environment via vswhere, so there is no toolchain-install or MSVC-setup
# step. Everything runs through dev.py with an explicit preset. See docs/guides/ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Informational only: doctor also probes clangd's compile DB and llvm-cov,
      # which aren't needed for build+test and would fail a fresh runner.
      - name: Doctor (toolchain info)
        run: uv run dev.py doctor
        continue-on-error: true

      - name: Build
        run: uv run dev.py build --preset relwithdebinfo-msvc

      - name: Test
        run: uv run dev.py test --preset relwithdebinfo-msvc --merged-xml-report build/ci-test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc-test-results
          path: build/ci-test-results.xml
          if-no-files-found: warn
